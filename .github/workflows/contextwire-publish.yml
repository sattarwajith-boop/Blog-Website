name: Publish ContextWire briefings

on:
  push:
    paths:
      - ".github/workflows/contextwire-publish.yml"
  workflow_dispatch:
    inputs:
      posts_per_run:
        description: "How many briefings to publish now"
        required: false
        default: "1"
  schedule:
    # 8:15 AM and 6:15 PM Asia/Colombo, expressed in UTC.
    - cron: "45 2 * * *"
    - cron: "45 12 * * *"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare ContextWire briefings
        run: node scripts/generate-posts.mjs
        env:
          POSTS_PER_RUN: ${{ github.event.inputs.posts_per_run || '1' }}
          BLOG_REGION: US
          BLOG_LANGUAGE: en-US
          BLOG_NAME: ContextWire
          SITE_URL: ${{ vars.SITE_URL || 'https://contextwire.online' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}

      - name: Upgrade and clean ContextWire output
        env:
          BLOG_NAME: ContextWire
          SITE_URL: ${{ vars.SITE_URL || 'https://contextwire.online' }}
        run: |
          node scripts/upgrade-quality.mjs
          node scripts/remove-quality-score.mjs
          node scripts/fix-public-brand.mjs
          node scripts/fix-public-domain.mjs
          node scripts/fix-analytics.mjs
          node scripts/audit-images.mjs
          node scripts/check-brand.mjs

      - name: Commit new briefings
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "contextwire-publisher"
            git config user.email "actions@github.com"
            git add data/posts.json data/index.json data/posts/ data/topics.json posts/ author/ rss.xml sitemap.xml robots.txt IMAGE_AUDIT_REPORT.md assets/quality-upgrades.css index.html archive.html about.html contact.html privacy.html terms.html editorial-policy.html corrections.html site.webmanifest
            git commit -m "Publish ContextWire briefings"
            git push
          else
            echo "No new posts to publish."
          fi
