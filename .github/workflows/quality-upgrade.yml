name: Quality upgrade posts

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: "Full website URL, for example https://contextwire.online"
        required: false
        default: "https://contextwire.online"

permissions:
  contents: write

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check scripts
        run: node --check scripts/generate-posts.mjs && node --check scripts/upgrade-quality.mjs && node --check scripts/remove-quality-score.mjs && node --check scripts/fix-public-brand.mjs && node --check scripts/fix-public-domain.mjs && node --check scripts/fix-analytics.mjs && node --check scripts/audit-images.mjs && node --check scripts/check-brand.mjs

      - name: Upgrade existing posts
        env:
          SITE_URL: ${{ github.event.inputs.site_url }}
          BLOG_NAME: ContextWire
        run: node scripts/upgrade-quality.mjs

      - name: Remove visible quality score cards
        run: node scripts/remove-quality-score.mjs

      - name: Clean public brand text
        run: node scripts/fix-public-brand.mjs

      - name: Clean public domain URLs
        env:
          SITE_URL: ${{ github.event.inputs.site_url }}
        run: node scripts/fix-public-domain.mjs

      - name: Add Analytics to public pages
        run: node scripts/fix-analytics.mjs

      - name: Audit topic image relevance
        run: node scripts/audit-images.mjs

      - name: Check old brand text
        run: node scripts/check-brand.mjs

      - name: Commit upgraded files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Apply ContextWire article quality upgrades"
          file_pattern: "data/posts.json data/index.json data/posts/*.json posts/*.html author/*.html assets/quality-upgrades.css robots.txt ADSENSE_READY_CHECKLIST.md IMAGE_AUDIT_REPORT.md rss.xml sitemap.xml site.webmanifest index.html archive.html about.html contact.html privacy.html terms.html editorial-policy.html corrections.html"
